name: css-font-diff
description: Capture and diff font rendering snapshots in GitHub Actions
inputs:
  baseline-name:
    description: Snapshot name for baseline
    default: baseline
  compare-name:
    description: Snapshot name for comparison
    default: compare
  url:
    description: URL to capture
    required: true
  threshold:
    description: Diff threshold percentage
    default: "0.1"
  selector:
    description: CSS selector
    default: body
  token:
    description: GitHub token for PR comments
    default: ${{ github.token }}
runs:
  using: composite
  steps:
    - name: Install deps
      shell: bash
      working-directory: ${{ github.action_path }}
      run: npm install --production

    - name: Install Playwright browser
      shell: bash
      working-directory: ${{ github.action_path }}
      run: npx playwright install --with-deps chromium

    - name: Capture baseline
      shell: bash
      working-directory: ${{ github.action_path }}
      run: npm exec -- css-font-diff capture --url "${{ inputs.url }}" --name "${{ inputs.baseline-name }}" --selector "${{ inputs.selector }}"

    - name: Prepare baseline selector snapshot
      shell: bash
      working-directory: ${{ github.action_path }}
      run: |
        safe_selector="$(printf '%s' "${{ inputs.selector }}" | sed 's/[^[:alnum:]_-]/_/g')"
        cp "snapshots/${{ inputs.baseline-name }}-chromium.png" "snapshots/${{ inputs.baseline-name }}-${safe_selector}-chromium.png"

    - name: Capture compare
      shell: bash
      working-directory: ${{ github.action_path }}
      run: npm exec -- css-font-diff capture --url "${{ inputs.url }}" --name "${{ inputs.compare-name }}" --selector "${{ inputs.selector }}"

    - name: Prepare compare selector snapshot
      shell: bash
      working-directory: ${{ github.action_path }}
      run: |
        safe_selector="$(printf '%s' "${{ inputs.selector }}" | sed 's/[^[:alnum:]_-]/_/g')"
        cp "snapshots/${{ inputs.compare-name }}-chromium.png" "snapshots/${{ inputs.compare-name }}-${safe_selector}-chromium.png"

    - name: Diff snapshots
      shell: bash
      working-directory: ${{ github.action_path }}
      env:
        GITHUB_TOKEN: ${{ inputs.token }}
      run: |
        args=(
          --baseline "${{ inputs.baseline-name }}"
          --compare "${{ inputs.compare-name }}"
          --threshold "${{ inputs.threshold }}"
          --selector "${{ inputs.selector }}"
        )
        if [ -n "${GITHUB_TOKEN}" ]; then
          args+=(--ci-comment)
        fi
        npm exec -- css-font-diff diff "${args[@]}"
