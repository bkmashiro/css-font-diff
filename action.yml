name: css-font-diff
description: Capture and diff font rendering snapshots in GitHub Actions
inputs:
  url:
    description: Page URL to capture
    required: true
  baseline-name:
    description: Snapshot name for baseline
    default: baseline
  compare-name:
    description: Snapshot name for comparison
    default: compare
  threshold:
    description: Diff threshold percentage
    default: "0.1"
  selector:
    description: CSS selector to screenshot
    default: body
  token:
    description: GitHub token for PR comments
    default: ${{ github.token }}
runs:
  using: composite
  steps:
    - name: Install deps
      shell: bash
      run: npm install --prefix "${{ github.action_path }}" --production

    - name: Capture baseline
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.token }}
      run: node "${{ github.action_path }}/dist/index.js" capture --url "${{ inputs.url }}" --name "${{ inputs.baseline-name }}"

    - name: Capture comparison
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.token }}
      run: node "${{ github.action_path }}/dist/index.js" capture --url "${{ inputs.url }}" --name "${{ inputs.compare-name }}"

    - name: Diff snapshots
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.token }}
      run: node "${{ github.action_path }}/dist/index.js" diff --baseline "${{ inputs.baseline-name }}" --compare "${{ inputs.compare-name }}" --threshold "${{ inputs.threshold }}" --selector "${{ inputs.selector }}" --ci-comment
